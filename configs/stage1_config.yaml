# configs/stage1_config.yaml
#
# Complete configuration for Stage 1: VM-UNet Teacher Network
# ===========================================================
# Stage 1 is a dedicated anatomy-understanding network.
# It learns to:
#   (1) Segment which pixels belong to which organ  → output S [B, 7, 512, 512]
#   (2) Produce compact per-organ feature vectors   → output e_a [B, 7, 96]
#
# After Stage 1 training is complete, its weights are FROZEN FOREVER.
# Stage 2 uses S and e_a as fixed conditioning signals (torch.no_grad()).
#
# Training curriculum:
#   Epochs 0 – (byol_start_epoch-1) : L_total = 1.0 * L_seg
#   Epochs byol_start_epoch onwards  : L_total = 1.0 * L_seg  +  0.1 * L_byol
#
# Reference: Architecture.pdf – Chapters 8, 9, 16 (Milestone 0-3)
# ─────────────────────────────────────────────────────────────────────────────


# ═════════════════════════════════════════════════════════════════════════════
# PATHS
# ═════════════════════════════════════════════════════════════════════════════
paths:
  # Root directory that contains per-patient sub-folders {PATIENT}/HDCT/ etc.
  data_root:    /home/teaching/Music/Nigam_51/Project_51/data

  # Pre-generated TotalSegmentator pseudo-label masks
  # Structure:  {masks_root}/{PATIENT}/{SLICE_IDX:04d}.npy
  # Generated by: python utils/generate_masks.py
  masks_root:   /home/teaching/Music/Nigam_51/Project_51/data/masks

  # All Stage 1 checkpoints and logs are written here
  output_dir:   /home/teaching/Music/Nigam_51/Project_51/outputs/stage1

  # Filename for the final frozen checkpoint passed to Stage 2
  # Full path = {output_dir}/{best_checkpoint}
  best_checkpoint: stage1_best.pth


# ═════════════════════════════════════════════════════════════════════════════
# MODEL  —  VM-UNet Teacher
# ═════════════════════════════════════════════════════════════════════════════
model:
  # ── Input / Output ────────────────────────────────────────────────────────
  in_channels:  1           # CT images are grayscale (single-channel HU map)
  num_classes:  7           # 0:background  1:liver_spleen  2:kidney
                            # 3:vessel      4:lung           5:bone
                            # 6:soft_tissue

  # ── Channel widths at each encoder scale ──────────────────────────────────
  # Scale 1: 96   (128×128 feature maps  after 4× patch embedding)
  # Scale 2: 192  (64×64)
  # Scale 3: 384  (32×32)
  # Scale 4: 768  (16×16  — bottleneck)
  # Doubling is achieved automatically by PatchMerging between scales.
  base_channels: 96

  # ── VSS block count per encoder scale  [enc1, enc2, enc3, enc4=bottleneck]
  # Two blocks per scale: first extracts raw features, second refines context.
  # Decoder uses mirrored counts (same depths list reversed).
  depths: [2, 2, 2, 2]

  # ── VMamba selective-scan state dim (VRAM ∝ d_state) ──────────────────────
  d_state: 8

  # ── Patch Embedding ───────────────────────────────────────────────────────
  # Conv2d(in_channels=1, out_channels=96, kernel_size=4, stride=4)
  # e.g. 256 / 4 = 64 → encoder scale-1 grid [B, 96, 64, 64]
  patch_size: 4

  # ── Bottleneck output dimension  (base_channels * 2^3 = 96 * 8 = 768) ────
  # Derived automatically but stated here for clarity / documentation.
  bottleneck_channels: 768  # base_channels * 8

  # ── Anatomy embedding dimension ───────────────────────────────────────────
  # e_a = masked-average-pooled decoder features before the segmentation head
  # Shape: [B, num_classes, anatomy_embed_dim]
  anatomy_embed_dim: 96     # equals base_channels (scale-1 decoder output)

  # ── Segmentation head ─────────────────────────────────────────────────────
  # Conv2d(base_channels, num_classes, kernel_size=1)  →  [B, 7, 512, 512]
  # Followed by Softmax(dim=1) to produce probabilities S.
  seg_head_kernel: 1

  # ── Upsampling strategy in decoder ───────────────────────────────────────
  # 'bilinear' avoids checkerboard artefacts from transposed convolutions.
  # A Linear (1×1 conv) projection follows each bilinear 2× upsample to
  # reduce channels (e.g. 768 → 384).
  upsample_mode: bilinear

  # ── VMamba scan variant used in VSS blocks ────────────────────────────────
  # 'ss2d'  — causal 4-directional scan (VMamba1, original VM-UNet)
  # 'vssd'  — non-causal scan (VMamba2/ICCV 2025), strictly better for images
  # Stage 1 uses ss2d to stay faithful to the VM-UNet paper baseline;
  # Stage 2 upgrades to vssd for the denoiser.
  scan_type: ss2d


# ═════════════════════════════════════════════════════════════════════════════
# TRAINING
# ═════════════════════════════════════════════════════════════════════════════
training:
  # ── Batch / resolution ───────────────────────────────────────────────────
  batch_size:  4     # smaller spatial size allows larger batches
  image_size:  256    # resize CT + masks (512² on disk → train at 256²)

  # ── Optimiser ─────────────────────────────────────────────────────────────
  # AdamW: applies weight decay directly to weights (not via gradient),
  # which is mathematically correct and outperforms vanilla Adam for
  # Transformer / Mamba-based networks.
  optimizer:     adamw
  learning_rate: 1.0e-4    # peak LR after linear warmup
  weight_decay:  0.01      # L2 regularisation coefficient

  # ── Schedule ──────────────────────────────────────────────────────────────
  total_steps:  30000      # total gradient update steps (smaller runs train faster)
  warmup_steps: 500        # linear LR warmup from 0 → learning_rate

  # After warmup, use cosine annealing: LR decays from learning_rate → 0
  # over the remaining (total_steps - warmup_steps) steps.
  lr_schedule: cosine      # options: cosine | constant | linear

  # ── Gradient clipping ────────────────────────────────────────────────────
  # Prevents gradient explosion in Mamba's recurrent state updates.
  grad_clip_norm: 1.0

  # ── Mixed precision ───────────────────────────────────────────────────────
  # bfloat16 recommended on A100/H100; float16 on older GPUs; float32 as fallback.
  precision: bfloat16       # options: bfloat16 | float16 | float32

  # ── Loss weights and schedule ─────────────────────────────────────────────
  #
  #   L_total = loss_seg_weight * L_seg  +  loss_byol_weight * L_byol
  #
  #   L_seg  : Cross-entropy with label smoothing against pseudo-labels.
  #             Active from step 0.  Primary objective.
  #
  #   L_byol : BYOL cosine-similarity loss.  Forces Stage 1 features to be
  #             invariant to noise level (NDCT vs LDCT views).
  #             Delayed by byol_start_epoch to let L_seg stabilise first.
  #
  loss_seg_weight:  1.0
  loss_byol_weight: 0.1    # λ_byol — scaled BYOL term (also called λ in docs)
  byol_start_epoch: 3      # BYOL loss active once epoch ≥ this

  # ── Label smoothing  (ε = 0.1) ────────────────────────────────────────────
  # TotalSegmentator makes errors 5-15% of the time, especially at boundaries.
  # Label smoothing prevents overconfidence on potentially-wrong labels.
  #   true_class  gets probability  (1 - ε)     = 0.90
  #   other classes get probability  ε / (K-1)  ≈ 0.014  each  (K=7)
  label_smoothing: 0.1

  # ── Augmentation ─────────────────────────────────────────────────────────
  augmentation:
    # Spatial augmentations applied identically to HDCT and mask
    random_flip_horizontal: true
    random_flip_vertical:   false   # axial CT slices: L-R flip ok, U-D unusual

    # HU-space intensity jitter for BYOL view generation
    # View 1 (online):  small Gaussian noise  σ ~ U(0, noise_sigma_view1)
    # View 2 (target):  large Gaussian noise  σ ~ U(0, noise_sigma_view2)
    noise_sigma_view1: 20.0         # HU — mild corruption for online network
    noise_sigma_view2: 80.0         # HU — heavy corruption (simulates LDCT)

    # HU window randomisation (keeps segmentation-relevant contrast)
    random_window_shift: 30.0       # ± HU shift to centre of display window
    random_window_scale: 0.15       # ± fraction of window width scaling


# ═════════════════════════════════════════════════════════════════════════════
# BYOL  —  Bootstrap Your Own Latent
# ═════════════════════════════════════════════════════════════════════════════
# BYOL makes Stage 1's anatomy features noise-invariant:
# the liver at 25% dose should produce the same e_a as at 100% dose.
#
# Architecture:
#   Bottleneck F [B, 768, 16, 16]
#       → Global Average Pool    [B, 768]
#       → Projector MLP          [B, projector_out]   (online + target)
#       → Predictor MLP          [B, projector_out]   (online ONLY)
#       → L_byol = 2 - 2*cosine_sim(q_online, z_target.detach())
#
byol:
  # ── Projector MLP  (both online and target networks) ─────────────────────
  # Linear(768, 4096) → BatchNorm → ReLU → Linear(4096, 256)
  projector_hidden: 4096
  projector_out:    256

  # ── Predictor MLP  (online network only — prevents representation collapse) ─
  # Linear(256, 4096) → BatchNorm → ReLU → Linear(4096, 256)
  predictor_hidden: 4096

  # ── EMA schedule for the target network ──────────────────────────────────
  # target_param = τ * target_param + (1 - τ) * online_param
  # τ starts at ema_tau_start and increases linearly to ema_tau_end.
  # High τ = target changes very slowly → stable learning signal.
  ema_tau_start: 0.996     # momentum at step 0    (0.4% online, 99.6% old)
  ema_tau_end:   1.0       # momentum at final step (target completely frozen)

  # ── Stop-gradient ────────────────────────────────────────────────────────
  # z_target is always detached before computing L_byol.
  # Gradients update the online network only; target is updated by EMA only.
  stop_gradient: true       # must always be true — do not change


# ═════════════════════════════════════════════════════════════════════════════
# DATA
# ═════════════════════════════════════════════════════════════════════════════
data:
  # ── DataLoader settings ───────────────────────────────────────────────────
  num_workers: 4            # parallel CPU workers for data loading
  pin_memory:  true         # pin RAM buffers for faster GPU transfer

  # ── Train / validation split ─────────────────────────────────────────────
  # Patients whose IDs match val_patients are held out; all others train.
  # Adjust based on your actual patient list from explore_data.py output.
  val_patients:             # leave blank to auto-pick last 10% of patients
    - C041
    - C043
    - C045
    - C047
    - C049
    - C051

  # ── HU normalisation applied before feeding to the network ────────────────
  # Clip to [hu_clip_min, hu_clip_max], then linearly map to [0, 1].
  # Values from the CT literature for whole-body protocols.
  hu_clip_min:  -1000       # air
  hu_clip_max:   1000       # dense bone

  # ── Slice sampling ───────────────────────────────────────────────────────
  # If a patient has more slices than max_slices_per_patient, randomly
  # subsample to this number per epoch (prevents very long patients dominating).
  max_slices_per_patient: null   # null = use all slices


# ═════════════════════════════════════════════════════════════════════════════
# LOGGING AND CHECKPOINTING
# ═════════════════════════════════════════════════════════════════════════════
logging:
  # ── Frequency ─────────────────────────────────────────────────────────────
  log_every_n_steps:  100   # console / TensorBoard cadence (train_stage1 uses this)
  eval_every_n_steps: 500   # validation Dice (fits ~60× over 30k steps)
  save_every_n_steps: 3000  # periodic checkpoints + stage1_best when Dice improves

  # ── Metrics tracked ───────────────────────────────────────────────────────
  # Training:   loss_total, loss_seg, loss_byol, learning_rate, grad_norm
  # Validation: loss_seg_val, dice_mean, dice_per_class[0..6],
  #             byol_cosine_sim (after byol_start_epoch)
  track_metrics:
    - loss_total
    - loss_seg
    - loss_byol
    - loss_seg_val
    - dice_mean
    - dice_background
    - dice_liver_spleen
    - dice_kidney
    - dice_vessel
    - dice_lung
    - dice_bone
    - dice_soft_tissue
    - learning_rate
    - grad_norm
    - byol_cosine_sim

  # ── Checkpoint retention ──────────────────────────────────────────────────
  keep_last_n_checkpoints: 3          # rolling window of recent checkpoints
  save_best_metric: dice_mean         # save separate best-model checkpoint
  save_best_mode:   max               # higher dice_mean = better

  # ── TensorBoard ───────────────────────────────────────────────────────────
  tensorboard: true
  tensorboard_dir: /home/teaching/Music/Nigam_51/Project_51/outputs/stage1/tb_logs

  # ── Visualisation (mask overlay panels, saved as images to TensorBoard) ───
  visualise_every_n_steps: 5000       # how often to log sample overlay images
  visualise_n_samples:     4          # number of val slices to overlay-visualise


# ═════════════════════════════════════════════════════════════════════════════
# HARDWARE
# ═════════════════════════════════════════════════════════════════════════════
hardware:
  # Set to null to auto-detect (uses all available GPUs via DataParallel /
  # DistributedDataParallel).  Override with e.g. [0] or [0, 1].
  gpus: null

  # Gradient accumulation: effective_batch = batch_size * accumulate_grad_batches
  # Useful when GPU memory limits batch_size below 8.
  accumulate_grad_batches: 1

  # Deterministic training (slightly slower but fully reproducible)
  seed: 42
  deterministic: false      # set true only for debugging (major slowdown)


# ═════════════════════════════════════════════════════════════════════════════
# SANITY CHECKS  (validated by the training script at startup)
# ═════════════════════════════════════════════════════════════════════════════
# These are not training parameters — they document invariants that the code
# asserts before the first training step.
assertions:
  # Derived channel sizes (for documentation and runtime assertion)
  channels_scale1: 96        # base_channels
  channels_scale2: 192       # base_channels * 2
  channels_scale3: 384       # base_channels * 4
  channels_scale4: 768       # base_channels * 8  (bottleneck)

  # Feature map sizes after patch embedding (image_size / patch_size); example image_size=256
  feat_size_scale1: 64       # 256 / 4
  feat_size_scale2: 32       # 256 / 8
  feat_size_scale3: 16       # 256 / 16
  feat_size_scale4: 8        # 256 / 32  (bottleneck spatial grid)

  # Output shapes (match training.image_size)
  S_shape:   [B, 7, 256, 256]   # soft segmentation map at train resolution
  e_a_shape: [B, 7, 96]          # anatomy embeddings
  F_shape:   [B, 768, 8, 8]      # bottleneck features when image_size=256 (BYOL)